name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: open-bookmark
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: open-bookmark/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run typecheck

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run typecheck

  desktop:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            open-bookmark/package-lock.json
            extension/package-lock.json
            desktop/package-lock.json
      - name: Build Nuxt runtime
        working-directory: open-bookmark
        run: npm ci && npm run build
      - name: Build extension
        working-directory: extension
        run: npm ci && npm run build
      - name: Test and pack desktop app (dir)
        working-directory: desktop
        run: npm ci && npm run test && npm run typecheck && npm run pack:dir

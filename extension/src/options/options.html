<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Bookmark — Einstellungen</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="options">
      <h1>Open Bookmark — Einstellungen</h1>

      <form id="settings-form" class="options__form">
        <label class="options__field">
          <span class="options__label">Server-Basis-URL</span>
          <input
            id="server-url"
            name="serverUrl"
            type="url"
            class="options__input"
            placeholder="http://localhost:3777"
            required
          />
        </label>

        <p class="options__hint">
          Open Bookmark Desktop oder lokaler Dev-Server:
          <code>http://localhost:3777</code>. Die App muss laufen, bevor die
          Extension speichern kann.
        </p>

        <div class="options__actions">
          <button type="submit" class="options__btn">Speichern</button>
          <button id="test-connection" type="button" class="options__btn options__btn--secondary">
            Verbindung testen
          </button>
        </div>
      </form>

      <p id="status" class="options__status" role="status" aria-live="polite"></p>
    </main>
    <script type="module" src="./options.ts"></script>
  </body>
</html>

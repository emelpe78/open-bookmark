<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Bookmark</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <h1 class="popup__title">Open Bookmark</h1>
      </header>

      <section class="popup__page" aria-label="Aktuelle Seite">
        <p id="page-title" class="popup__page-title">…</p>
        <p id="page-url" class="popup__page-url">…</p>
      </section>

      <div class="popup__field">
        <span class="popup__label">Tags (optional)</span>
        <p class="popup__description">
          Kommagetrennt; wird als Kleinbuchstaben mit Bindestrichen gespeichert.
        </p>
        <div class="popup__tags-wrap">
          <input
            id="tags"
            class="popup__input"
            type="text"
            placeholder="nuxt, open-source, lesen"
            autocomplete="off"
            spellcheck="false"
          />
          <ul id="tag-suggestions-list" class="popup__tag-suggestions" hidden></ul>
        </div>
      </div>

      <label class="popup__field">
        <span class="popup__label">Notiz (optional)</span>
        <textarea
          id="notes"
          class="popup__textarea"
          rows="3"
          placeholder="Kurzer Markdown-Hinweis…"
        ></textarea>
      </label>

      <label id="list-field" class="popup__field" hidden>
        <span class="popup__label">Zu Liste hinzufügen</span>
        <select id="list-select" class="popup__select">
          <option value="">— keine Liste —</option>
        </select>
      </label>

      <button
        id="save-btn"
        type="button"
        class="popup__btn popup__btn--primary"
        disabled
      >
        Speichern
      </button>

      <p id="status" class="popup__status" role="status" aria-live="polite"></p>

      <div id="duplicate-actions" class="popup__duplicate" hidden>
        <p class="popup__duplicate-text">
          Diese Seite ist bereits gespeichert.
        </p>
        <div class="popup__duplicate-buttons">
          <button id="duplicate-open-app" type="button" class="popup__btn popup__btn--secondary">
            In Open Bookmark öffnen
          </button>
          <button
            id="duplicate-refresh"
            type="button"
            class="popup__btn popup__btn--secondary"
            hidden
          >
            Metadaten aktualisieren
          </button>
        </div>
      </div>

      <footer class="popup__footer">
        <button id="open-app" type="button" class="popup__link">
          In Open Bookmark öffnen
        </button>
        <button id="open-options" type="button" class="popup__link">
          Einstellungen
        </button>
      </footer>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
